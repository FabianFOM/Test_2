<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lernplattform</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, sans-serif;
    }

    body {
      background: #f4f5f7;
      color: #222;
    }

    .header {
      background: #111827;
      color: white;
      padding: 1.5rem;
      text-align: center;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 0.6rem 1rem;
      border: none;
      border-radius: 999px;
      background: #e5e7eb;
      cursor: pointer;
    }

    .tab-btn.active {
      background: #2563eb;
      color: white;
    }

    .container {
      max-width: 1300px;
      margin: 1rem auto;
      padding: 1rem;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 1.5rem;
      box-shadow: 0 1px 5px rgba(0,0,0,0.08);
    }

    .hidden {
      display: none;
    }

    button {
      border: none;
      background: #2563eb;
      color: white;
      padding: 0.6rem 1rem;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 0.6rem;
      border-radius: 6px;
      border: 1px solid #d1d5db;
      margin-top: 0.4rem;
      margin-bottom: 1rem;
    }

    textarea {
      resize: vertical;
    }

    h2 {
      margin-bottom: 1rem;
    }

    .workspace-toolbar {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .workspace-layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 1rem;
    }

    .folder-sidebar {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 1rem;
      min-height: 700px;
    }

    .folder-item {
      padding: 0.7rem;
      border-radius: 8px;
      background: #f3f4f6;
      margin-bottom: 0.5rem;
      cursor: pointer;
    }

    .folder-item:hover {
      background: #dbeafe;
    }

    .folder-item.active {
      background: #2563eb;
      color: white;
    }

    .workspace-canvas {
      position: relative;
      min-height: 700px;
      background: white;
      border: 2px dashed #cbd5e1;
      border-radius: 10px;
      overflow: hidden;
    }

    .workspace-item {
      position: absolute;
      width: 250px;
      min-height: 180px;
      background: #f9fafb;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 0.75rem;
      resize: both;
      overflow: auto;
      cursor: move;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .workspace-item textarea {
      border: none;
      resize: none;
      background: transparent;
      outline: none;
      height: 120px;
      margin: 0;
    }

    .workspace-item img {
      width: 100%;
      border-radius: 8px;
      margin-top: 0.5rem;
    }

    .workspace-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .delete-btn {
      background: #dc2626;
      padding: 0.3rem 0.6rem;
      font-size: 0.8rem;
    }

    @media(max-width: 900px) {
      .workspace-layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<header class="header">
  <h1>Lernplattform</h1>

  <div class="tabs">
    <button class="tab-btn active" data-tab="workspaceTab">
      Workspace
    </button>
  </div>
</header>

<main class="container">

  <section id="workspaceTab" class="card">

    <h2>Workspace / Lernfläche</h2>

    <div class="workspace-toolbar">

      <button id="createFolderBtn">
        Ordner erstellen
      </button>

      <button id="addTextBtn">
        Textbox hinzufügen
      </button>

      <button id="addImageBtn">
        Bild hinzufügen
      </button>

      <input
        type="file"
        id="imageInput"
        accept="image/*"
        style="display:none;"
      >

    </div>

    <div class="workspace-layout">

      <div class="folder-sidebar">
        <h3>Ordner</h3>

        <div id="folderList"></div>
      </div>

      <div
        id="workspaceCanvas"
        class="workspace-canvas"
      ></div>

    </div>

  </section>

</main>

<script>

  const STORAGE_KEY = "workspace_data_v1";

  let workspaceData =
    JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

  let currentFolderId = null;

  const folderList =
    document.getElementById("folderList");

  const workspaceCanvas =
    document.getElementById("workspaceCanvas");

  const createFolderBtn =
    document.getElementById("createFolderBtn");

  const addTextBtn =
    document.getElementById("addTextBtn");

  const addImageBtn =
    document.getElementById("addImageBtn");

  const imageInput =
    document.getElementById("imageInput");


  function saveData() {

    localStorage.setItem(
      STORAGE_KEY,
      JSON.stringify(workspaceData)
    );
  }


  function createFolder(name) {

    const folder = {
      id: Date.now(),
      name,
      items: []
    };

    workspaceData.push(folder);

    saveData();

    renderFolders();

    selectFolder(folder.id);
  }


  createFolderBtn.addEventListener("click", () => {

    const name = prompt("Ordnername:");

    if (!name) return;

    createFolder(name);
  });


  function renderFolders() {

    folderList.innerHTML = "";

    if (workspaceData.length === 0) {

      folderList.innerHTML =
        "<p>Noch keine Ordner vorhanden.</p>";

      return;
    }

    workspaceData.forEach(folder => {

      const div = document.createElement("div");

      div.className = "folder-item";

      if (folder.id === currentFolderId) {
        div.classList.add("active");
      }

      div.textContent = folder.name;

      div.addEventListener("click", () => {
        selectFolder(folder.id);
      });

      folderList.appendChild(div);
    });
  }


  function selectFolder(folderId) {

    currentFolderId = folderId;

    renderFolders();

    renderWorkspace();
  }


  function getCurrentFolder() {

    return workspaceData.find(
      f => f.id === currentFolderId
    );
  }


  function renderWorkspace() {

    workspaceCanvas.innerHTML = "";

    const folder = getCurrentFolder();

    if (!folder) return;

    folder.items.forEach(item => {

      const div = document.createElement("div");

      div.className = "workspace-item";

      div.style.left = item.x + "px";

      div.style.top = item.y + "px";

      div.style.width = item.width || "250px";

      div.style.height = item.height || "180px";


      const header = document.createElement("div");

      header.className = "workspace-header";


      const title = document.createElement("span");

      title.textContent =
        item.type === "image"
        ? "Bild"
        : "Notiz";


      const deleteBtn = document.createElement("button");

      deleteBtn.className = "delete-btn";

      deleteBtn.textContent = "X";


      deleteBtn.addEventListener("click", () => {

        folder.items =
          folder.items.filter(i => i.id !== item.id);

        saveData();

        renderWorkspace();
      });


      header.appendChild(title);

      header.appendChild(deleteBtn);

      div.appendChild(header);


      if (item.type === "text") {

        const textarea =
          document.createElement("textarea");

        textarea.value = item.content || "";

        textarea.addEventListener("input", () => {

          item.content = textarea.value;

          saveData();
        });

        div.appendChild(textarea);
      }


      if (item.type === "image") {

        const img = document.createElement("img");

        img.src = item.src;

        div.appendChild(img);
      }


      makeDraggable(div, item);

      workspaceCanvas.appendChild(div);
    });
  }


  addTextBtn.addEventListener("click", () => {

    const folder = getCurrentFolder();

    if (!folder) {

      alert("Bitte zuerst einen Ordner erstellen.");

      return;
    }

    folder.items.push({

      id: Date.now(),

      type: "text",

      content: "Neue Lernnotiz...",

      x: 40,

      y: 40,

      width: "250px",

      height: "180px"
    });

    saveData();

    renderWorkspace();
  });


  addImageBtn.addEventListener("click", () => {

    const folder = getCurrentFolder();

    if (!folder) {

      alert("Bitte zuerst einen Ordner erstellen.");

      return;
    }

    imageInput.click();
  });


  imageInput.addEventListener("change", (e) => {

    const file = e.target.files[0];

    if (!file) return;

    const reader = new FileReader();

    reader.onload = () => {

      const folder = getCurrentFolder();

      folder.items.push({

        id: Date.now(),

        type: "image",

        src: reader.result,

        x: 60,

        y: 60,

        width: "280px",

        height: "240px"
      });

      saveData();

      renderWorkspace();
    };

    reader.readAsDataURL(file);
  });


  function makeDraggable(element, item) {

    let isDragging = false;

    let offsetX = 0;

    let offsetY = 0;


    element.addEventListener("mousedown", (e) => {

      if (
        e.target.tagName === "TEXTAREA" ||
        e.target.tagName === "BUTTON"
      ) {
        return;
      }

      isDragging = true;

      offsetX = e.offsetX;

      offsetY = e.offsetY;
    });


    document.addEventListener("mousemove", (e) => {

      if (!isDragging) return;

      const rect =
        workspaceCanvas.getBoundingClientRect();

      item.x =
        e.clientX - rect.left - offsetX;

      item.y =
        e.clientY - rect.top - offsetY;

      element.style.left = item.x + "px";

      element.style.top = item.y + "px";
    });


    document.addEventListener("mouseup", () => {

      if (isDragging) {

        item.width = element.style.width;

        item.height = element.style.height;

        saveData();
      }

      isDragging = false;
    });
  }


  renderFolders();

  if (workspaceData.length > 0) {

    selectFolder(workspaceData[0].id);
  }

</script>

</body>
</html>
