<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOM Lernplattform</title>

<style>
:root {
    --fom-blue: #003A8F;
    --fom-light: #f4f7fb;
    --fom-accent: #0055cc;
}

body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: var(--fom-light);
}

header {
    background: var(--fom-blue);
    color: white;
    padding: 1rem;
    text-align: center;
}

nav {
    display: flex;
    justify-content: space-around;
    background: white;
    padding: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

nav button {
    padding: 10px;
    border: none;
    background: var(--fom-accent);
    color: white;
    cursor: pointer;
}

.container {
    padding: 20px;
}

.card {
    background: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 8px;
}

input, textarea {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
}

.dark {
    background: #1e1e1e;
    color: white;
}

.dark .card {
    background: #2c2c2c;
}
</style>
</head>

<body>

<header>
    <h1>📘 FOM Lernplattform</h1>
    <p>Dein persönliches KI-Lernsystem</p>
</header>

<nav>
    <button onclick="showTab('scripts')">Skripte</button>
    <button onclick="showTab('notes')">Notizen</button>
    <button onclick="showTab('flashcards')">Lernkarten</button>
    <button onclick="toggleDarkMode()">🌙</button>
</nav>

<div class="container">

    <!-- Skripte -->
    <div id="scripts">
        <h2>📁 Skripte hochladen</h2>
        <input type="file" id="fileInput">
        <button onclick="saveFile()">Speichern</button>
        <div id="fileList"></div>
    </div>

    <!-- Notizen -->
    <div id="notes" style="display:none">
        <h2>📝 Notizen</h2>
        <textarea id="noteInput" placeholder="Deine Notizen..."></textarea>
        <button onclick="saveNote()">Speichern</button>
        <div id="notesList"></div>
    </div>

    <!-- Flashcards -->
    <div id="flashcards" style="display:none">
        <h2>🧠 Lernkarten</h2>
        <input id="question" placeholder="Frage">
        <input id="answer" placeholder="Antwort">
        <button onclick="addFlashcard()">Hinzufügen</button>
        <div id="flashcardList"></div>
    </div>

</div>

<script>
function showTab(tab) {
    document.getElementById('scripts').style.display = 'none';
    document.getElementById('notes').style.display = 'none';
    document.getElementById('flashcards').style.display = 'none';
    document.getElementById(tab).style.display = 'block';
}

// FILES
function saveFile() {
    const file = document.getElementById('fileInput').files[0];
    if (!file) return;

    let reader = new FileReader();
    reader.onload = function(e) {
        let files = JSON.parse(localStorage.getItem('files') || "[]");
        files.push({name: file.name, data: e.target.result});
        localStorage.setItem('files', JSON.stringify(files));
        displayFiles();
    };
    reader.readAsDataURL(file);
}

function displayFiles() {
    let files = JSON.parse(localStorage.getItem('files') || "[]");
    let list = document.getElementById('fileList');
    list.innerHTML = "";

    files.forEach(f => {
        let el = document.createElement('div');
        el.className = "card";
        el.innerHTML = `<a href="${f.data}" download="${f.name}">${f.name}</a>`;
        list.appendChild(el);
    });
}

// NOTES
function saveNote() {
    let note = document.getElementById('noteInput').value;
    let notes = JSON.parse(localStorage.getItem('notes') || "[]");
    notes.push(note);
    localStorage.setItem('notes', JSON.stringify(notes));
    displayNotes();
}

function displayNotes() {
    let notes = JSON.parse(localStorage.getItem('notes') || "[]");
    let list = document.getElementById('notesList');
    list.innerHTML = "";
    notes.forEach(n => {
        let el = document.createElement('div');
        el.className = "card";
        el.textContent = n;
        list.appendChild(el);
    });
}

// FLASHCARDS
function addFlashcard() {
    let q = document.getElementById('question').value;
    let a = document.getElementById('answer').value;

    let cards = JSON.parse(localStorage.getItem('cards') || "[]");
    cards.push({q,a});
    localStorage.setItem('cards', JSON.stringify(cards));
    displayCards();
}

function displayCards() {
    let cards = JSON.parse(localStorage.getItem('cards') || "[]");
    let list = document.getElementById('flashcardList');
    list.innerHTML = "";

    cards.forEach(c => {
        let el = document.createElement('div');
        el.className = "card";
        el.innerHTML = `<b>${c.q}</b><br>${c.a}`;
        list.appendChild(el);
    });
}

// DARK MODE
function toggleDarkMode() {
    document.body.classList.toggle("dark");
}

// INIT
displayFiles();
displayNotes();
displayCards();
</script>

</body>
</html>
