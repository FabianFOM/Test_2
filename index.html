<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Lernplattform</title>
  <style>
    body {
      font-family: Arial;
      max-width: 800px;
      margin: auto;
      padding: 20px;
      background: #f5f5f5;
    }

    h1, h2 {
      color: #333;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, button, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    pre {
      background: #222;
      color: #0f0;
      padding: 10px;
      overflow-x: auto;
    }
  </style>
</head>
<body>

<h1>📚 Lernplattform</h1>

<div class="card">
  <h2>📤 PDF hochladen</h2>
  <input type="file" id="pdfFile" accept="application/pdf">
  <button onclick="uploadPDF()">Upload</button>
  <p id="uploadStatus"></p>
</div>

<div class="card">
  <h2>❓ Frage zum Skript</h2>
  <textarea id="question" placeholder="Stelle eine Frage..."></textarea>
  <button onclick="askAI()">Fragen</button>
  <pre id="answer"></pre>
</div>

<div class="card">
  <h2>🧪 Test generieren</h2>
  <button onclick="generateTest()">Test erstellen</button>
  <pre id="test"></pre>
</div>

<script>
let pdfText = "";

// 📄 PDF lesen (Frontend)
async function uploadPDF() {
  const file = document.getElementById("pdfFile").files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = async function() {
    const typedarray = new Uint8Array(this.result);

    const pdf = await pdfjsLib.getDocument(typedarray).promise;
    let text = "";

    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(item => item.str).join(" ");
    }

    pdfText = text;
    document.getElementById("uploadStatus").innerText = "✅ PDF geladen!";
  };

  reader.readAsArrayBuffer(file);
}

// 🤖 Frage stellen
async function askAI() {
  const question = document.getElementById("question").value;

  const response = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer DEIN_API_KEY_HIER"
    },
    body: JSON.stringify({
      model: "gpt-4.1-mini",
      messages: [
        {
          role: "system",
          content: "Beantworte Fragen nur basierend auf dem Skript."
        },
        {
          role: "user",
          content: pdfText + "\n\nFrage:\n" + question
        }
      ]
    })
  });

  const data = await response.json();
  document.getElementById("answer").innerText =
    data.choices[0].message.content;
}

// 🧪 Test generieren
async function generateTest() {
  const response = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer DEIN_API_KEY_HIER"
    },
    body: JSON.stringify({
      model: "gpt-4.1-mini",
      messages: [
        {
          role: "system",
          content: "Erstelle einen Multiple Choice Test mit 5 Fragen."
        },
        {
          role: "user",
          content: pdfText
        }
      ]
    })
  });

  const data = await response.json();
  document.getElementById("test").innerText =
    data.choices[0].message.content;
}
</script>

<!-- PDF.js CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

</body>
</html>
